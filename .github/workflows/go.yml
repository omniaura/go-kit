name: Go

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - '1.25.5'
          - '1.26.1'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run workspace tests
        run: ./scripts/test-all.sh
